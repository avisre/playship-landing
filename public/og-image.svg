<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg { fill: #FAFAF7; }
      .ink { fill: #0A0A0A; }
      .muted { fill: #4B5563; }
      .approved { fill: #15803D; }
      .approved-soft { fill: #DCFCE7; }
      .line { stroke: rgba(10,10,10,0.18); stroke-width: 1; fill: none; }
      .sans { font-family: 'Geist', 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-weight: 500; }
      .mono { font-family: 'Geist Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace; font-weight: 500; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="630"/>

  <!-- Eyebrow badge -->
  <g transform="translate(80,96)">
    <rect class="approved-soft" x="0" y="0" rx="6" ry="6" width="430" height="36"/>
    <text class="mono approved" x="16" y="24" font-size="14" letter-spacing="1.6">GOOGLE PLAY SUBMISSION SERVICE</text>
  </g>

  <!-- Title -->
  <text class="sans ink" x="80" y="220" font-size="76" letter-spacing="-0.01em">Your app is built.</text>
  <text class="sans ink" x="80" y="305" font-size="76" letter-spacing="-0.01em">We get it past Google's</text>
  <text class="sans ink" x="80" y="390" font-size="76" letter-spacing="-0.01em">review gauntlet.</text>

  <!-- Subhead -->
  <text class="sans muted" x="80" y="455" font-size="26">Submission, policy compliance, and rejection recovery.</text>
  <text class="sans muted" x="80" y="492" font-size="26">Live in 7 days, or your money back.</text>

  <!-- Footer line -->
  <line class="line" x1="80" y1="540" x2="1120" y2="540"/>

  <!-- Logo / domain -->
  <text class="sans ink" x="80" y="585" font-size="22">PlayShip</text>
  <text class="mono muted" x="1120" y="585" font-size="18" text-anchor="end">playship.pro</text>
</svg>
