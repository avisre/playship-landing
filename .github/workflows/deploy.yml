name: Deploy to Render

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: render-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show commit
        run: |
          echo "Triggering Render deploy for commit ${GITHUB_SHA}"
          echo "Branch: ${GITHUB_REF_NAME}"

      - name: Trigger Render deploy
        id: trigger
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -e
          response=$(mktemp)
          http_code=$(curl -sS -o "$response" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -d '{"clearCache":"do_not_clear"}')
          echo "HTTP status: ${http_code}"
          # Print response body without leaking the API key
          cat "$response"
          echo
          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::Render API returned non-2xx status ${http_code}"
            exit 1
          fi
          deploy_id=$(jq -r '.id // empty' "$response")
          if [ -z "$deploy_id" ]; then
            echo "::error::Could not parse deploy id from Render response"
            exit 1
          fi
          echo "deploy_id=${deploy_id}" >> "$GITHUB_OUTPUT"
          echo "Render deploy queued: ${deploy_id}"

      - name: Poll deploy status
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          DEPLOY_ID: ${{ steps.trigger.outputs.deploy_id }}
        run: |
          set -e
          # Poll for up to ~10 minutes (60 * 10s)
          max_attempts=60
          attempt=0
          terminal_failure="build_failed deactivated canceled pre_deploy_failed update_failed"
          terminal_success="live"
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))
            body=$(curl -sS \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}")
            status=$(printf '%s' "$body" | jq -r '.status // "unknown"')
            echo "[$attempt/$max_attempts] Render deploy ${DEPLOY_ID} status: ${status}"
            case " ${terminal_success} " in
              *" ${status} "*)
                echo "Deploy succeeded."
                exit 0
                ;;
            esac
            case " ${terminal_failure} " in
              *" ${status} "*)
                echo "::error::Deploy ended with status ${status}"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "::warning::Polling timed out after $((max_attempts * 10))s; deploy is still in progress on Render."
          # Don't fail the workflow just because we ran out of polling time — the deploy was queued.
          exit 0
