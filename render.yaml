services:
  - type: web
    name: playship-landing
    runtime: static
    repo: https://github.com/avisre/playship-landing
    branch: master
    domains:
      - playship.pro
      - www.playship.pro
    buildCommand: npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    routes:
      # Collapse non-trailing-slash duplicates onto the canonical (slash) URL.
      # Sources are exact paths (they don't match the slash version), so no loop.
      - type: redirect
        source: /contact
        destination: /contact/
      - type: redirect
        source: /privacy
        destination: /privacy/
      - type: redirect
        source: /refund
        destination: /refund/
      - type: redirect
        source: /terms
        destination: /terms/
      - type: rewrite
        source: /sitemap.xml
        destination: /sitemap-index.xml
